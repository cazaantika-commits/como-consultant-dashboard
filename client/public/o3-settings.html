<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إعدادات التدفق — O3</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f5f5f5; padding: 20px; direction: rtl; }
  h2 { text-align: center; margin-bottom: 6px; color: #1a1a2e; font-size: 17px; }
  h3 { text-align: center; margin-bottom: 16px; color: #d97706; font-size: 13px; }
  .project-name { text-align: center; margin-bottom: 12px; color: #6366f1; font-size: 14px; font-weight: 600; }
  .loading { text-align: center; padding: 60px; color: #888; font-size: 14px; }
  .error { text-align: center; padding: 40px; color: #dc2626; font-size: 14px; background: #fef2f2; border-radius: 8px; margin: 20px; }
  table { border-collapse: collapse; width: 100%; background: #fff; margin-bottom: 20px; }
  th, td { border: 1px solid #ccc; padding: 5px 8px; font-size: 11px; text-align: center; vertical-align: middle; }
  th { font-weight: bold; }
  .col-item { text-align: right; background: #f0f4ff; font-weight: 500; white-space: nowrap; }
  .col-amount { font-weight: bold; color: #1a1a2e; font-size: 11px; }
  .paid { background: #e8f5e9; color: #1b5e20; font-weight: bold; }
  .section-header { background: #d97706; color: #fff; font-weight: bold; font-size: 12px; text-align: right; }
  .section-header td { background: #d97706; color: #fff; }
  .h-main { background: #1a1a2e; color: #fff; font-size: 11px; }
  .total-row td { background: #1a1a2e; color: #fbbf24; font-weight: bold; font-size: 12px; border-color: #333; }
  .capital-row td { background: #dc2626; color: #fff; font-weight: bold; font-size: 12px; border-color: #991b1b; }
  .escrow-total-row td { background: #1d4ed8; color: #fff; font-weight: bold; font-size: 12px; border-color: #1e40af; }
  .na-cell { color: #999; }
  select { font-size: 10px; padding: 2px 4px; border: 1px solid #aaa; border-radius: 3px; width: 100%; }
  input[type="number"] { font-size: 10px; padding: 2px 4px; border: 1px solid #aaa; border-radius: 3px; width: 50px; text-align: center; }
  .method-select { background: #fefce8; }
  .phase-select { background: #f0f4ff; font-weight: 600; }
  .source-select { font-weight: 600; }
  .source-investor { background: #fef3c7; color: #92400e; }
  .source-escrow { background: #dbeafe; color: #1d4ed8; }
  .pct-container { margin-top: 4px; display: flex; flex-wrap: wrap; gap: 3px; justify-content: center; align-items: center; }
  .pct-field { display: inline-flex; align-items: center; gap: 1px; font-size: 9px; }
  .pct-field label { font-size: 8px; color: #555; }
  .pct-field input { width: 38px; font-size: 9px; padding: 1px 2px; border: 1px solid #bbb; border-radius: 2px; text-align: center; }
  .pct-total { font-size: 9px; font-weight: bold; margin-top: 2px; text-align: center; }
  .pct-total.ok { color: green; }
  .pct-total.err { color: red; }
  .equal-info { font-size: 9px; color: #166534; background: #f0fdf4; padding: 2px 6px; border-radius: 3px; }
  .lump-info { display: inline-flex; align-items: center; gap: 4px; }
  .phase-info-box { margin-top: 10px; padding: 10px; background: #f0f4ff; border-radius: 6px; font-size: 11px; color: #334155; }
  .save-bar { text-align: center; margin: 16px 0; }
  .save-btn { background: #16a34a; color: #fff; border: none; padding: 10px 40px; font-size: 14px; font-weight: bold; border-radius: 8px; cursor: pointer; }
  .save-btn:hover { background: #15803d; }
  .save-btn:disabled { background: #9ca3af; cursor: not-allowed; }
  .save-msg { margin-top: 8px; font-size: 12px; }
  .save-msg.ok { color: #16a34a; }
  .save-msg.err { color: #dc2626; }
</style>
</head>
<body>

<h2>إعدادات التدفق النقدي</h2>
<h3>السيناريو الثالث — بدون أوف بلان</h3>
<div id="project-name" class="project-name"></div>
<div id="loading" class="loading">جاري تحميل البيانات...</div>
<div id="error" class="error" style="display:none;"></div>
<div id="table-container" style="display:none;"></div>

<script>
var SCENARIO_KEY = 'o3';
var SCENARIO_DB = 'no_offplan';

function fmt(n) { return Math.round(n).toLocaleString('en-US'); }

function getDurationForPhase(phaseType, phaseInfo) {
  if (phaseType === 'design' && phaseInfo.design) return phaseInfo.design.duration;
  if (phaseType === 'construction' && phaseInfo.construction) return phaseInfo.construction.duration;
  return 1;
}

function getPhaseRange(phaseType, phaseInfo) {
  if (phaseType === 'design' && phaseInfo.design) {
    var s = phaseInfo.design.start || phaseInfo.design.startMonth || 1;
    return { start: s, end: s + phaseInfo.design.duration - 1 };
  }
  if (phaseType === 'construction' && phaseInfo.construction) {
    var s = phaseInfo.construction.start || phaseInfo.construction.startMonth || 1;
    return { start: s, end: s + phaseInfo.construction.duration - 1 };
  }
  return { start: 1, end: 1 };
}

function buildPhaseSelect(itemKey, currentPhase) {
  var html = '<select class="phase-select" data-item="' + itemKey + '" onchange="onPhaseChange(this)">';
  html += '<option value="design"' + (currentPhase === 'design' ? ' selected' : '') + '>التصاميم</option>';
  html += '<option value="construction"' + (currentPhase !== 'design' ? ' selected' : '') + '>التنفيذ</option>';
  html += '</select>';
  return html;
}

function buildSourceSelect(itemKey, currentSource) {
  var cls = (currentSource === 'investor') ? 'source-investor' : 'source-escrow';
  var html = '<select class="source-select ' + cls + '" data-item="' + itemKey + '" onchange="onSourceChange(this)">';
  html += '<option value="investor"' + (currentSource === 'investor' ? ' selected' : '') + '>المستثمر</option>';
  html += '<option value="escrow"' + (currentSource === 'escrow' ? ' selected' : '') + '>حساب الضمان</option>';
  html += '</select>';
  return html;
}

function buildMethodSelect(itemKey, currentMethod) {
  var opts = [
    { v: 'lump_sum', l: 'دفعة واحدة' },
    { v: 'equal_spread', l: 'دفعات متساوية' },
    { v: 'custom', l: 'نسب مخصصة' },
  ];
  var html = '<select class="method-select" data-item="' + itemKey + '" onchange="onMethodChange(this)">';
  for (var o of opts) {
    html += '<option value="' + o.v + '"' + (o.v === currentMethod ? ' selected' : '') + '>' + o.l + '</option>';
  }
  html += '</select>';
  return html;
}

function buildDetailCell(itemKey, method, phaseType, phaseInfo, item) {
  var duration = getDurationForPhase(phaseType, phaseInfo);
  var amount = item[SCENARIO_KEY].amount;
  var savedLumpMonth = item._savedLumpMonth || 1;
  var savedCustom = item._savedCustom || null;

  if (method === 'lump_sum') {
    var html = '<div class="lump-info"><span style="font-size:9px;">الشهر</span> ';
    html += '<select class="lump-month-select" style="width:50px;font-size:10px;" data-item="' + itemKey + '">';
    for (var m = 1; m <= duration; m++) {
      html += '<option value="' + m + '"' + (m === savedLumpMonth ? ' selected' : '') + '>' + m + '</option>';
    }
    html += '</select><span style="font-size:9px;"> من ' + duration + '</span></div>';
    return '<td class="detail-cell">' + html + '</td>';
  }

  if (method === 'equal_spread') {
    var perMonth = amount / duration;
    return '<td class="detail-cell"><span class="equal-info">÷ ' + duration + ' شهر = ' + fmt(perMonth) + ' / شهر</span></td>';
  }

  if (method === 'custom') {
    var html = '<div class="pct-container" id="pct-' + itemKey + '">';
    for (var m = 0; m < duration; m++) {
      var val = '';
      if (savedCustom && savedCustom[m] !== undefined) val = savedCustom[m];
      html += '<div class="pct-field"><label>ش' + (m+1) + '</label>';
      html += '<input type="number" min="0" max="100" step="0.1" value="' + val + '" data-item="' + itemKey + '" data-month="' + m + '" oninput="onPctChange(\'' + itemKey + '\',' + duration + ')">';
      html += '%</div>';
    }
    html += '</div><div class="pct-total" id="pct-total-' + itemKey + '">المجموع: 0%</div>';
    return '<td class="detail-cell">' + html + '</td>';
  }

  return '<td class="detail-cell na-cell">—</td>';
}

function onPhaseChange(sel) {
  var itemKey = sel.getAttribute('data-item');
  var item = window._itemsMap[itemKey];
  if (!item) return;
  item._chosenPhase = sel.value;
  var row = sel.closest('tr');
  var detailCell = row.querySelector('.detail-cell');
  if (!detailCell) return;
  var methodSel = row.querySelector('.method-select');
  var method = methodSel ? methodSel.value : 'lump_sum';
  item._savedLumpMonth = 1;
  item._savedCustom = null;
  detailCell.outerHTML = buildDetailCell(itemKey, method, sel.value, window._phaseInfo, item);
  if (method === 'custom') onPctChange(itemKey, getDurationForPhase(sel.value, window._phaseInfo));
}

function onSourceChange(sel) {
  sel.className = 'source-select ' + (sel.value === 'investor' ? 'source-investor' : 'source-escrow');
  recalcTotals();
}

function recalcTotals() {
  var investorTotal = 0;
  var escrowTotal = 0;
  var allItems = window._allItems || [];
  for (var item of allItems) {
    if (!item[SCENARIO_KEY].active) continue;
    var amount = item[SCENARIO_KEY].amount;
    var row = document.querySelector('tr[data-itemkey="' + item.itemKey + '"]');
    var fundingSource = item.fundingSource;
    if (row) {
      var sourceSel = row.querySelector('.source-select');
      if (sourceSel) fundingSource = sourceSel.value;
    }
    if (item.section === 'paid') fundingSource = 'investor';
    if (fundingSource === 'investor') {
      investorTotal += amount;
    } else {
      escrowTotal += amount;
    }
  }
  var grandTotal = investorTotal + escrowTotal;
  // Update the totals rows in the table
  var rows = document.querySelectorAll('tr');
  for (var r of rows) {
    var firstTd = r.querySelector('td');
    if (!firstTd) continue;
    var text = firstTd.textContent.trim();
    if (text.indexOf('رأس المال المطلوب') >= 0) {
      var amountTd = r.querySelectorAll('td')[1];
      if (amountTd) amountTd.textContent = fmt(investorTotal);
    } else if (text.indexOf('إجمالي حساب الضمان') >= 0) {
      var amountTd = r.querySelectorAll('td')[1];
      if (amountTd) amountTd.textContent = escrowTotal > 0 ? fmt(escrowTotal) : '—';
    } else if (text.indexOf('الإجمالي الكلي') >= 0) {
      var amountTd = r.querySelectorAll('td')[1];
      if (amountTd) amountTd.textContent = fmt(grandTotal);
    }
  }
}

function onMethodChange(sel) {
  var itemKey = sel.getAttribute('data-item');
  var item = window._itemsMap[itemKey];
  if (!item) return;
  var row = sel.closest('tr');
  var detailCell = row.querySelector('.detail-cell');
  if (!detailCell) return;
  var phaseType = item._chosenPhase || 'construction';
  item._savedLumpMonth = 1;
  item._savedCustom = null;
  detailCell.outerHTML = buildDetailCell(itemKey, sel.value, phaseType, window._phaseInfo, item);
  if (sel.value === 'custom') onPctChange(itemKey, getDurationForPhase(phaseType, window._phaseInfo));
}

function onPctChange(itemKey, duration) {
  var container = document.getElementById('pct-' + itemKey);
  if (!container) return;
  var inputs = container.querySelectorAll('input[type="number"]');
  var total = 0;
  inputs.forEach(function(inp) { total += parseFloat(inp.value) || 0; });
  var el = document.getElementById('pct-total-' + itemKey);
  if (el) {
    el.textContent = 'المجموع: ' + total.toFixed(1) + '%';
    el.className = 'pct-total ' + (Math.abs(total - 100) < 0.1 ? 'ok' : 'err');
  }
}

function collectSaveData() {
  var items = [];
  var allItems = window._allItems || [];
  for (var item of allItems) {
    var isPaid = (item.section === 'paid');
    var row = document.querySelector('tr[data-itemkey="' + item.itemKey + '"]');
    var fundingSource = item.fundingSource;
    var chosenPhase = item._chosenPhase || (item.section === 'design' ? 'design' : 'construction');
    var distributionMethod = item.distributionMethod;
    var lumpSumMonth = null;
    var startMonth = null;
    var endMonth = null;
    var customJson = null;

    if (row && !isPaid) {
      var sourceSel = row.querySelector('.source-select');
      if (sourceSel) fundingSource = sourceSel.value;
      var phaseSel = row.querySelector('.phase-select');
      if (phaseSel) chosenPhase = phaseSel.value;
      var methodSel = row.querySelector('.method-select');
      if (methodSel) distributionMethod = methodSel.value;
      var phaseRange = getPhaseRange(chosenPhase, window._phaseInfo);
      var duration = getDurationForPhase(chosenPhase, window._phaseInfo);

      if (distributionMethod === 'lump_sum') {
        var lumpSel = row.querySelector('.lump-month-select');
        var relMonth = lumpSel ? parseInt(lumpSel.value) : 1;
        lumpSumMonth = phaseRange.start + relMonth - 1;
        startMonth = lumpSumMonth;
        endMonth = lumpSumMonth;
      } else if (distributionMethod === 'equal_spread') {
        startMonth = phaseRange.start;
        endMonth = phaseRange.end;
      } else if (distributionMethod === 'custom') {
        startMonth = phaseRange.start;
        endMonth = phaseRange.end;
        var pctContainer = document.getElementById('pct-' + item.itemKey);
        if (pctContainer) {
          var inputs = pctContainer.querySelectorAll('input[type="number"]');
          var pcts = [];
          inputs.forEach(function(inp) { pcts.push(parseFloat(inp.value) || 0); });
          customJson = JSON.stringify(pcts);
        }
      }
    } else if (isPaid) {
      fundingSource = 'investor';
      distributionMethod = 'lump_sum';
      lumpSumMonth = 1;
      startMonth = 1;
      endMonth = 1;
    }

    items.push({
      itemKey: item.itemKey,
      nameAr: item.nameAr,
      category: item.category || 'other',
      section: item.section || 'construction',
      isActive: item[SCENARIO_KEY].active,
      sortOrder: item.sortOrder || 0,
      amountOverride: null,
      distributionMethod: distributionMethod,
      lumpSumMonth: lumpSumMonth,
      startMonth: startMonth,
      endMonth: endMonth,
      customJson: customJson,
      fundingSource: fundingSource,
      notes: null,
    });
  }
  return items;
}

async function saveSettings() {
  var btn = document.getElementById('save-btn');
  var msg = document.getElementById('save-msg');
  btn.disabled = true;
  btn.textContent = 'جاري الحفظ...';
  msg.textContent = '';
  msg.className = 'save-msg';

  try {
    var params = new URLSearchParams(window.location.search);
    var projectId = Number(params.get('projectId'));
    var items = collectSaveData();

    var resp = await fetch('/api/trpc/cashFlowSettings.saveSettings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ json: { projectId: projectId, scenario: SCENARIO_DB, items: items } }),
    });
    var json = await resp.json();
    if (json.error) throw new Error(json.error.message || 'خطأ في الحفظ');

    msg.textContent = 'تم الحفظ بنجاح ✓';
    msg.className = 'save-msg ok';
    btn.textContent = 'حفظ الإعدادات';
    btn.disabled = false;
  } catch (err) {
    msg.textContent = 'خطأ: ' + (err.message || 'فشل الحفظ');
    msg.className = 'save-msg err';
    btn.textContent = 'حفظ الإعدادات';
    btn.disabled = false;
  }
}

async function loadData() {
  var params = new URLSearchParams(window.location.search);
  var projectId = params.get('projectId');
  if (!projectId) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = 'لم يتم تحديد مشروع.';
    return;
  }

  try {
    var resp = await fetch('/api/trpc/cashFlowSettings.getCostSettingsComparison?input=' + encodeURIComponent(JSON.stringify({ json: { projectId: Number(projectId) } })));
    var json = await resp.json();
    if (json.error) throw new Error(json.error.message || 'خطأ');
    var data = json.result.data.json;
    document.getElementById('project-name').textContent = data.projectName;

    var phaseInfo = data.phaseInfo;
    window._phaseInfo = phaseInfo;
    window._itemsMap = {};
    window._allItems = [];

    var savedResp = await fetch('/api/trpc/cashFlowSettings.getSettings?input=' + encodeURIComponent(JSON.stringify({ json: { projectId: Number(projectId), scenario: SCENARIO_DB } })));
    var savedJson = await savedResp.json();
    var savedData = savedJson.result ? savedJson.result.data.json : null;
    var savedMap = {};
    if (savedData && (savedData.settings || savedData.items)) {
      var savedItems = savedData.settings || savedData.items;
      for (var si of savedItems) { savedMap[si.itemKey] = si; }
    }

    for (var item of data.items) {
      var saved = savedMap[item.itemKey];
      if (saved && saved.startMonth) {
        var designEnd = phaseInfo.design ? phaseInfo.design.endMonth : 0;
        item._chosenPhase = (saved.startMonth <= designEnd) ? 'design' : 'construction';
      } else {
        item._chosenPhase = (item.section === 'design') ? 'design' : 'construction';
      }
      if (saved) {
        item.distributionMethod = saved.distributionMethod || item.distributionMethod;
        item.fundingSource = saved.fundingSource || item.fundingSource;
        item._savedLumpMonth = null;
        item._savedCustom = null;
        if (saved.distributionMethod === 'lump_sum' && saved.lumpSumMonth) {
          var phaseRange = getPhaseRange(item._chosenPhase, phaseInfo);
          item._savedLumpMonth = saved.lumpSumMonth - phaseRange.start + 1;
          if (item._savedLumpMonth < 1) item._savedLumpMonth = 1;
        }
        if (saved.distributionMethod === 'custom' && saved.customJson) {
          try { item._savedCustom = JSON.parse(saved.customJson); } catch(e) {}
        }
      }
      window._itemsMap[item.itemKey] = item;
      window._allItems.push(item);
    }

    var html = '<table><thead><tr>';
    html += '<th class="h-main" style="text-align:right;min-width:160px;">البند</th>';
    html += '<th class="h-main" style="min-width:90px;">المبلغ (د.إ)</th>';
    html += '<th class="h-main" style="min-width:90px;">المصدر</th>';
    html += '<th class="h-main" style="min-width:80px;">المرحلة</th>';
    html += '<th class="h-main" style="min-width:100px;">طريقة الدفع</th>';
    html += '<th class="h-main" style="min-width:200px;">التفاصيل</th>';
    html += '</tr></thead><tbody>';

    var sectionMap = {};
    for (var s of data.sections) sectionMap[s.id] = { label: s.label, items: [] };
    for (var item of data.items) {
      if (!item[SCENARIO_KEY].active) continue;
      if (sectionMap[item.section]) sectionMap[item.section].items.push(item);
    }

    for (var s of data.sections) {
      var sec = sectionMap[s.id];
      if (sec.items.length === 0) continue;
      html += '<tr class="section-header"><td colspan="6">' + sec.label + '</td></tr>';
      for (var item of sec.items) {
        var amount = item[SCENARIO_KEY].amount;
        var isPaid = (item.section === 'paid');
        html += '<tr data-itemkey="' + item.itemKey + '">';
        html += '<td class="col-item">' + item.nameAr + '</td>';
        html += '<td class="col-amount">' + fmt(amount) + '</td>';
        if (isPaid) {
          html += '<td class="paid">مدفوع</td><td class="na-cell">—</td><td class="na-cell">—</td><td class="na-cell">—</td>';
        } else {
          html += '<td>' + buildSourceSelect(item.itemKey, item.fundingSource) + '</td>';
          html += '<td>' + buildPhaseSelect(item.itemKey, item._chosenPhase) + '</td>';
          html += '<td>' + buildMethodSelect(item.itemKey, item.distributionMethod) + '</td>';
          html += buildDetailCell(item.itemKey, item.distributionMethod, item._chosenPhase, phaseInfo, item);
        }
        html += '</tr>';
      }
    }

    var investorTotal = data.totals.investorCapital[SCENARIO_KEY];
    var escrowTotal = data.totals.escrowTotal[SCENARIO_KEY];
    var grandTotal = data.totals.grandTotal[SCENARIO_KEY];

    html += '<tr class="capital-row"><td style="text-align:right;">رأس المال المطلوب (المستثمر)</td><td>' + fmt(investorTotal) + '</td><td colspan="4"></td></tr>';
    html += '<tr class="escrow-total-row"><td style="text-align:right;">إجمالي حساب الضمان</td><td>' + (escrowTotal > 0 ? fmt(escrowTotal) : '—') + '</td><td colspan="4"></td></tr>';
    html += '<tr class="total-row"><td style="text-align:right;">الإجمالي الكلي</td><td>' + fmt(grandTotal) + '</td><td colspan="4"></td></tr>';
    html += '</tbody></table>';

    html += '<div class="save-bar"><button id="save-btn" class="save-btn" onclick="saveSettings()">حفظ الإعدادات</button>';
    html += '<div id="save-msg" class="save-msg"></div></div>';

    html += '<div class="phase-info-box"><strong>المدد الزمنية (من البطاقة التعريفية):</strong> ';
    html += 'التصاميم: ' + phaseInfo.design.duration + ' شهر | ';
    html += 'الإنشاء: ' + phaseInfo.construction.duration + ' شهر | ';
    html += 'التسليم: ' + phaseInfo.handover.duration + ' شهر';
    html += ' | الإجمالي: ' + data.totalMonths + ' شهر</div>';

    document.getElementById('loading').style.display = 'none';
    document.getElementById('table-container').style.display = 'block';
    document.getElementById('table-container').innerHTML = html;

    for (var item of data.items) {
      if (item.distributionMethod === 'custom' && item[SCENARIO_KEY].active) {
        var dur = getDurationForPhase(item._chosenPhase, phaseInfo);
        onPctChange(item.itemKey, dur);
      }
    }

  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = 'خطأ: ' + (err.message || 'فشل تحميل البيانات');
  }
}

loadData();
</script>
</body>
</html>
