<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إعدادات التدفق — O3</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f5f5f5; padding: 20px; direction: rtl; }
  h2 { text-align: center; margin-bottom: 6px; color: #1a1a2e; font-size: 17px; }
  h3 { text-align: center; margin-bottom: 16px; color: #15803d; font-size: 13px; }
  .project-name { text-align: center; margin-bottom: 12px; color: #6366f1; font-size: 14px; font-weight: 600; }
  .loading { text-align: center; padding: 60px; color: #888; font-size: 14px; }
  .error { text-align: center; padding: 40px; color: #dc2626; font-size: 14px; background: #fef2f2; border-radius: 8px; margin: 20px; }
  table { border-collapse: collapse; width: 100%; background: #fff; margin-bottom: 20px; }
  th, td { border: 1px solid #ccc; padding: 5px 8px; font-size: 11px; text-align: center; }
  th { font-weight: bold; }
  .col-item { text-align: right; background: #f0f4ff; font-weight: 500; white-space: nowrap; }
  .col-amount { font-weight: bold; color: #1a1a2e; font-size: 11px; }
  .col-source { font-weight: bold; }
  .investor { background: #fef3c7; color: #92400e; }
  .escrow { background: #dbeafe; color: #1d4ed8; }
  .paid { background: #e8f5e9; color: #1b5e20; font-weight: bold; }
  .section-header { background: #15803d; color: #fff; font-weight: bold; font-size: 12px; text-align: right; }
  .section-header td { background: #15803d; color: #fff; }
  .h-main { background: #1a1a2e; color: #fff; font-size: 11px; }
  .total-row td { background: #1a1a2e; color: #fbbf24; font-weight: bold; font-size: 12px; border-color: #333; }
  .capital-row td { background: #dc2626; color: #fff; font-weight: bold; font-size: 12px; border-color: #991b1b; }
  .escrow-total-row td { background: #1d4ed8; color: #fff; font-weight: bold; font-size: 12px; border-color: #1e40af; }
  .na-cell { color: #999; }
  select { font-size: 10px; padding: 2px 4px; border: 1px solid #aaa; border-radius: 3px; width: 100%; }
  input[type="number"] { font-size: 10px; padding: 2px 4px; border: 1px solid #aaa; border-radius: 3px; width: 50px; text-align: center; }
  .month-input { background: #fef3c7; }
</style>
</head>
<body>

<h2>إعدادات التدفق النقدي</h2>
<h3>السيناريو الثالث — بدون أوف بلان</h3>
<div id="project-name" class="project-name"></div>
<div id="loading" class="loading">جاري تحميل البيانات...</div>
<div id="error" class="error" style="display:none;"></div>
<div id="table-container" style="display:none;"></div>

<script>
const SCENARIO_KEY = 'o3'; // This file shows O3 = no_offplan

function fmt(n) {
  return Math.round(n).toLocaleString('en-US');
}

function getPhaseLabel(section) {
  if (section === 'paid') return '—';
  if (section === 'design') return 'التصاميم';
  if (section === 'offplan') return 'أوف بلان';
  if (section === 'construction') return 'التنفيذ';
  if (section === 'escrow') return 'التنفيذ';
  return 'التنفيذ';
}

function getMethodLabel(method) {
  if (method === 'lump_sum') return 'دفعة واحدة';
  if (method === 'equal_spread') return 'دفعات متساوية';
  if (method === 'custom') return 'نسب مخصصة';
  return 'دفعة واحدة';
}

function renderSourceCell(item) {
  if (item.fundingSource === 'investor') {
    if (item.section === 'paid') return '<td class="paid">مدفوع</td>';
    return '<td class="col-source investor">المستثمر</td>';
  }
  return '<td class="col-source escrow">حساب الضمان</td>';
}

function renderDetailCell(item, phaseInfo) {
  if (item.section === 'paid') return '<td class="na-cell">—</td>';
  
  var method = item.distributionMethod || 'lump_sum';
  var section = item.section;
  var phaseDuration = 1;
  
  if (section === 'design' && phaseInfo.design) phaseDuration = phaseInfo.design.duration;
  else if (section === 'offplan' && phaseInfo.offplan) phaseDuration = phaseInfo.offplan.duration;
  else if ((section === 'construction' || section === 'escrow') && phaseInfo.construction) phaseDuration = phaseInfo.construction.duration;
  
  if (method === 'lump_sum') {
    var phaseStart = 1;
    if (section === 'design' && phaseInfo.design) phaseStart = phaseInfo.design.start;
    else if (section === 'offplan' && phaseInfo.offplan) phaseStart = phaseInfo.offplan.start;
    else if ((section === 'construction' || section === 'escrow') && phaseInfo.construction) phaseStart = phaseInfo.construction.start;
    
    var relMonth = 1;
    if (item.lumpSumMonth) relMonth = Math.max(1, item.lumpSumMonth - phaseStart + 1);
    
    return '<td><input type="number" class="month-input" min="1" max="' + phaseDuration + '" value="' + relMonth + '"> <span style="font-size:9px;">من المرحلة</span></td>';
  } else if (method === 'equal_spread') {
    return '<td><span style="font-size:9px;">موزعة على ' + phaseDuration + ' شهر</span></td>';
  } else if (method === 'custom') {
    return '<td><span style="font-size:9px;">نسب مخصصة</span></td>';
  }
  return '<td class="na-cell">—</td>';
}

async function loadData() {
  var params = new URLSearchParams(window.location.search);
  var projectId = params.get('projectId');
  
  if (!projectId) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = 'لم يتم تحديد مشروع. اختر مشروعاً من القائمة أعلاه.';
    return;
  }

  try {
    var resp = await fetch('/api/trpc/cashFlowSettings.getCostSettingsComparison?input=' + encodeURIComponent(JSON.stringify({ json: { projectId: Number(projectId) } })));
    var json = await resp.json();
    
    if (json.error) throw new Error(json.error.message || 'خطأ في تحميل البيانات');

    var data = json.result.data.json;
    document.getElementById('project-name').textContent = data.projectName;
    
    var phaseInfo = data.phaseInfo;
    
    var html = '<table><thead><tr>';
    html += '<th class="h-main" style="text-align:right;">البند</th>';
    html += '<th class="h-main">المبلغ (د.إ)</th>';
    html += '<th class="h-main">المصدر</th>';
    html += '<th class="h-main">المرحلة</th>';
    html += '<th class="h-main">طريقة الدفع</th>';
    html += '<th class="h-main">التفاصيل</th>';
    html += '</tr></thead><tbody>';

    var sectionMap = {};
    for (var s of data.sections) {
      sectionMap[s.id] = { label: s.label, items: [] };
    }
    for (var item of data.items) {
      if (!item[SCENARIO_KEY].active) continue;
      if (sectionMap[item.section]) {
        sectionMap[item.section].items.push(item);
      }
    }

    for (var s of data.sections) {
      var sec = sectionMap[s.id];
      if (sec.items.length === 0) continue;
      
      html += '<tr class="section-header"><td colspan="6">' + sec.label + '</td></tr>';
      
      for (var item of sec.items) {
        var amount = item[SCENARIO_KEY].amount;
        var isPaid = item.section === 'paid';
        
        html += '<tr>';
        html += '<td class="col-item">' + item.nameAr + '</td>';
        html += '<td class="col-amount">' + fmt(amount) + '</td>';
        html += renderSourceCell(item);
        
        if (isPaid) {
          html += '<td class="na-cell">—</td>';
          html += '<td class="na-cell">—</td>';
          html += '<td class="na-cell">—</td>';
        } else {
          html += '<td>' + getPhaseLabel(item.section) + '</td>';
          html += '<td>' + getMethodLabel(item.distributionMethod) + '</td>';
          html += renderDetailCell(item, phaseInfo);
        }
        html += '</tr>';
      }
    }

    var investorTotal = data.totals.investorCapital[SCENARIO_KEY];
    var escrowTotal = data.totals.escrowTotal[SCENARIO_KEY];
    var grandTotal = data.totals.grandTotal[SCENARIO_KEY];

    html += '<tr class="capital-row">';
    html += '<td style="text-align:right;">رأس المال المطلوب (المستثمر)</td>';
    html += '<td>' + fmt(investorTotal) + '</td>';
    html += '<td colspan="4"></td>';
    html += '</tr>';

    if (escrowTotal > 0) {
      html += '<tr class="escrow-total-row">';
      html += '<td style="text-align:right;">إجمالي حساب الضمان</td>';
      html += '<td>' + fmt(escrowTotal) + '</td>';
      html += '<td colspan="4"></td>';
      html += '</tr>';
    }

    html += '<tr class="total-row">';
    html += '<td style="text-align:right;">الإجمالي الكلي</td>';
    html += '<td>' + fmt(grandTotal) + '</td>';
    html += '<td colspan="4"></td>';
    html += '</tr>';

    html += '</tbody></table>';

    html += '<div style="margin-top:10px;padding:10px;background:#f0fdf4;border-radius:6px;font-size:11px;color:#334155;">';
    html += '<strong>المدد الزمنية:</strong> ';
    html += 'التصاميم: ' + phaseInfo.design.duration + ' شهر | ';
    html += 'الإنشاء: ' + phaseInfo.construction.duration + ' شهر | ';
    html += 'التسليم: ' + phaseInfo.handover.duration + ' شهر';
    html += ' | الإجمالي: ' + data.totalMonths + ' شهر';
    html += '</div>';

    document.getElementById('loading').style.display = 'none';
    document.getElementById('table-container').style.display = 'block';
    document.getElementById('table-container').innerHTML = html;

  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = 'خطأ: ' + (err.message || 'فشل تحميل البيانات');
  }
}

loadData();
</script>

</body>
</html>
