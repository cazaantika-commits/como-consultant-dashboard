<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ملخص الجدوى المالية</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f5f5f5; padding: 20px; direction: rtl; color: #1a1a2e; }
  .container { max-width: 66%; margin: 0 auto; }

  .header { text-align: center; margin-bottom: 16px; }
  .header h2 { font-size: 18px; color: #1a1a2e; margin-bottom: 4px; }
  .header p { font-size: 11px; color: #64748b; }

  .toggle-container { display: flex; justify-content: center; gap: 0; margin-bottom: 16px; }
  .toggle-btn {
    padding: 8px 24px; font-size: 12px; font-weight: bold; cursor: pointer;
    border: 1px solid #e2e8f0; background: #fff; color: #94a3b8; transition: all 0.2s;
  }
  .toggle-btn:first-child { border-radius: 0 8px 8px 0; border-left: none; }
  .toggle-btn:last-child { border-radius: 8px 0 0 8px; }
  .toggle-btn.active-offplan { background: #7c3aed; color: #fff; border-color: #7c3aed; }
  .toggle-btn.active-no-offplan { background: #b45309; color: #fff; border-color: #b45309; }

  .kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 16px; }
  .kpi-grid.four-cols { grid-template-columns: repeat(4, 1fr); }
  .kpi-card { border-radius: 12px; border: 1px solid; padding: 12px; text-align: center; }
  .kpi-label { font-size: 10px; font-weight: 500; margin-bottom: 4px; opacity: 0.7; }
  .kpi-value { font-size: 18px; font-weight: bold; font-family: 'Courier New', monospace; }
  .kpi-sub { font-size: 9px; margin-top: 2px; opacity: 0.5; }
  .kpi-rose { background: #fff1f2; border-color: #fecdd3; color: #be123c; }
  .kpi-emerald { background: #ecfdf5; border-color: #a7f3d0; color: #047857; }
  .kpi-blue { background: #eff6ff; border-color: #bfdbfe; color: #1d4ed8; }
  .kpi-amber { background: #fffbeb; border-color: #fde68a; color: #b45309; }
  .kpi-violet { background: #f5f3ff; border-color: #ddd6fe; color: #7c3aed; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-items: start; }

  .table-card { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; }
  .table-header { padding: 10px 16px; border-bottom: 1px solid #f1f5f9; background: #fafafa; font-size: 12px; font-weight: bold; color: #334155; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: right; padding: 8px 12px; font-size: 10px; color: #64748b; font-weight: 600; background: #fafafa; border-bottom: 1px solid #e2e8f0; }
  td { padding: 6px 12px; font-size: 11px; color: #334155; border-bottom: 1px solid #f8fafc; }
  .amount-col { text-align: left; font-weight: 600; font-family: 'Courier New', monospace; direction: ltr; }

  .badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; display: inline-block; font-weight: 600; }
  .badge-investor { background: #fef3c7; color: #92400e; }
  .badge-escrow { background: #dbeafe; color: #1d4ed8; }
  .badge-paid { background: #dcfce7; color: #166534; }

  .section-row { background: #f5f3ff; }
  .section-row td { font-weight: bold; color: #7c3aed; font-size: 11px; padding: 6px 12px; }

  .total-row-cost { background: #fff1f2; border-top: 2px solid #fecdd3; }
  .total-row-cost td { font-weight: bold; color: #be123c; font-size: 12px; }

  .capital-row { background: #fffbeb; border-top: 2px solid #fde68a; }
  .capital-row td { font-weight: bold; color: #b45309; font-size: 12px; }
  .escrow-total-row { background: #eff6ff; border-top: 2px solid #bfdbfe; }
  .escrow-total-row td { font-weight: bold; color: #1d4ed8; font-size: 12px; }
  .return-row { background: #f5f3ff; }
  .return-row td { font-weight: bold; color: #7c3aed; }

  .summary-label { color: #475569; }
  .summary-sub { font-size: 9px; color: #94a3b8; margin-top: 1px; }
  .row-rose td:last-child { color: #be123c; }
  .row-emerald td:last-child { color: #047857; }
  .row-blue td:last-child { color: #1d4ed8; }
  .row-amber td:last-child { color: #b45309; }
  .row-violet td:last-child { color: #7c3aed; }
  .row-indigo td:last-child { color: #4338ca; }

  .note { text-align: center; font-size: 9px; color: #94a3b8; margin-top: 12px; font-style: italic; }
  .loading { text-align: center; padding: 60px; font-size: 14px; color: #94a3b8; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>ملخص الجدوى المالية</h2>
    <p id="headerSub">جاري التحميل...</p>
  </div>
  <div id="content"><div class="loading">جاري تحميل البيانات...</div></div>
</div>

<script>
var DATA = null;
var currentView = 'offplan';

function fmt(n) {
  if (n === 0) return '—';
  return Math.round(n).toLocaleString('en-US');
}

function pct(a, b) {
  if (b === 0) return '0%';
  return (a / b * 100).toFixed(1) + '%';
}

function getBadge(source) {
  if (source === 'paid') return '<span class="badge badge-paid">مدفوع</span>';
  if (source === 'escrow') return '<span class="badge badge-escrow">الضمان</span>';
  return '<span class="badge badge-investor">المستثمر</span>';
}

async function loadData() {
  var params = new URLSearchParams(window.location.search);
  var projectId = params.get('projectId');
  if (!projectId) { document.getElementById('content').innerHTML = '<div class="loading">خطأ: لم يتم تحديد المشروع</div>'; return; }

  try {
    var resp = await fetch('/api/trpc/cashFlowSettings.getCostSettingsComparison?input=' + encodeURIComponent(JSON.stringify({ json: { projectId: Number(projectId) } })));
    var json = await resp.json();
    DATA = json.result.data.json;
    document.getElementById('headerSub').textContent = DATA.projectName + ' — الإيرادات المتوقعة: ' + fmt(DATA.totalRevenue) + ' درهم';
    render();
  } catch (e) {
    document.getElementById('content').innerHTML = '<div class="loading">خطأ في تحميل البيانات: ' + e.message + '</div>';
  }
}

function showScenario(type) {
  currentView = type;
  render();
}

function render() {
  if (!DATA) return;

  // Map scenarios: offplan = O1 (offplan_escrow), no-offplan = O3 (no_offplan)
  var scKey = currentView === 'offplan' ? 'o1' : 'o3';
  var totalRevenue = DATA.totalRevenue;

  // Separate items by funding source
  var investorItems = [];
  var escrowItems = [];
  var investorTotal = 0;
  var escrowTotal = 0;

  // Group items by section
  var sectionMap = {};
  DATA.sections.forEach(function(s) { sectionMap[s.id] = s.label; });

  DATA.items.forEach(function(item) {
    var sc = item[scKey];
    if (!sc || !sc.active) return;
    var amount = sc.amount;
    if (item.fundingSource === 'escrow') {
      escrowItems.push({ name: item.nameAr, amount: amount, section: item.section });
      escrowTotal += amount;
    } else {
      investorItems.push({ name: item.nameAr, amount: amount, section: item.section, fundingSource: item.fundingSource });
      investorTotal += amount;
    }
  });

  var grandTotal = investorTotal + escrowTotal;
  var profit = totalRevenue - grandTotal;
  var profitPct = pct(profit, grandTotal);
  var roiPct = currentView === 'offplan' ? pct(profit, investorTotal) : pct(profit, grandTotal);

  // Build HTML
  var html = '';

  // Toggle buttons
  html += '<div class="toggle-container">';
  html += '<button class="toggle-btn ' + (currentView === 'offplan' ? 'active-offplan' : '') + '" onclick="showScenario(\'offplan\')">مع البيع على الخارطة</button>';
  html += '<button class="toggle-btn ' + (currentView !== 'offplan' ? 'active-no-offplan' : '') + '" onclick="showScenario(\'no-offplan\')">بدون البيع على الخارطة</button>';
  html += '</div>';

  // KPI Cards
  if (currentView === 'offplan') {
    html += '<div class="kpi-grid">';
    html += '<div class="kpi-card kpi-rose"><div class="kpi-label">إجمالي التكاليف</div><div class="kpi-value">' + fmt(grandTotal) + '</div><div class="kpi-sub">درهم</div></div>';
    html += '<div class="kpi-card kpi-emerald"><div class="kpi-label">إجمالي الإيرادات</div><div class="kpi-value">' + fmt(totalRevenue) + '</div><div class="kpi-sub">درهم</div></div>';
    html += '<div class="kpi-card kpi-blue"><div class="kpi-label">صافي الربح</div><div class="kpi-value">' + fmt(profit) + '</div><div class="kpi-sub">' + profitPct + ' من التكلفة</div></div>';
    html += '<div class="kpi-card kpi-amber"><div class="kpi-label">رأس المال المطلوب</div><div class="kpi-value">' + fmt(investorTotal) + '</div><div class="kpi-sub">مصاريف المستثمر</div></div>';
    html += '<div class="kpi-card kpi-violet"><div class="kpi-label">العائد على رأس المال</div><div class="kpi-value">' + roiPct + '</div><div class="kpi-sub">ربح ÷ رأس المال</div></div>';
    html += '</div>';
  } else {
    html += '<div class="kpi-grid four-cols">';
    html += '<div class="kpi-card kpi-rose"><div class="kpi-label">إجمالي التكاليف</div><div class="kpi-value">' + fmt(grandTotal) + '</div><div class="kpi-sub">درهم</div></div>';
    html += '<div class="kpi-card kpi-emerald"><div class="kpi-label">إجمالي الإيرادات</div><div class="kpi-value">' + fmt(totalRevenue) + '</div><div class="kpi-sub">درهم</div></div>';
    html += '<div class="kpi-card kpi-blue"><div class="kpi-label">صافي الربح</div><div class="kpi-value">' + fmt(profit) + '</div><div class="kpi-sub">' + profitPct + ' من التكلفة</div></div>';
    html += '<div class="kpi-card kpi-amber"><div class="kpi-label">رأس المال المطلوب</div><div class="kpi-value">' + fmt(grandTotal) + '</div><div class="kpi-sub">المستثمر يتحمل الكامل</div></div>';
    html += '</div>';
  }

  html += '<div class="two-col">';

  // ─── Left: Cost breakdown table ───
  html += '<div class="table-card">';
  html += '<div class="table-header">تفصيل التكاليف — المستثمر</div>';
  html += '<table><thead><tr><th>البند</th><th style="text-align:center;">المصدر</th><th style="text-align:left;">المبلغ (درهم)</th></tr></thead><tbody>';

  // Group investor items by section
  var currentSection = '';
  investorItems.forEach(function(item) {
    if (item.section !== currentSection) {
      currentSection = item.section;
      var sectionLabel = sectionMap[currentSection] || currentSection;
      html += '<tr class="section-row"><td colspan="3">' + sectionLabel + '</td></tr>';
    }
    var badge = item.fundingSource === 'paid' ? getBadge('paid') : getBadge('investor');
    html += '<tr><td>' + item.name + '</td><td style="text-align:center;">' + badge + '</td><td class="amount-col">' + fmt(item.amount) + '</td></tr>';
  });

  html += '<tr class="capital-row"><td>رأس المال المطلوب (المستثمر)</td><td></td><td class="amount-col">' + fmt(investorTotal) + '</td></tr>';
  html += '</tbody></table>';

  // Escrow section (only for offplan)
  if (currentView === 'offplan' && escrowItems.length > 0) {
    html += '<div class="table-header" style="border-top:1px solid #e2e8f0;">من حساب الضمان</div>';
    html += '<table><tbody>';
    escrowItems.forEach(function(item) {
      html += '<tr><td>' + item.name + '</td><td style="text-align:center;">' + getBadge('escrow') + '</td><td class="amount-col">' + fmt(item.amount) + '</td></tr>';
    });
    html += '<tr class="escrow-total-row"><td>إجمالي حساب الضمان</td><td></td><td class="amount-col">' + fmt(escrowTotal) + '</td></tr>';
    html += '</tbody></table>';
  }

  // Grand total
  html += '<table><tbody><tr class="total-row-cost"><td>الإجمالي الكلي</td><td></td><td class="amount-col">' + fmt(grandTotal) + '</td></tr></tbody></table>';
  html += '</div>';

  // ─── Right: Summary table ───
  html += '<div class="table-card">';
  html += '<div class="table-header">ملخص الجدوى المالية</div>';
  html += '<table><tbody>';
  html += '<tr class="row-rose"><td class="summary-label">إجمالي التكاليف</td><td class="amount-col">' + fmt(grandTotal) + '</td></tr>';
  html += '<tr class="row-emerald"><td class="summary-label">إجمالي الإيرادات</td><td class="amount-col">' + fmt(totalRevenue) + '</td></tr>';
  html += '<tr class="row-blue"><td class="summary-label">صافي الربح</td><td class="amount-col">' + fmt(profit) + '</td></tr>';
  html += '<tr class="row-blue"><td class="summary-label">نسبة الربح من التكلفة الكلية</td><td class="amount-col">' + profitPct + '</td></tr>';
  html += '<tr><td colspan="2" style="border-top:2px dashed #e2e8f0;padding:4px;"></td></tr>';

  if (currentView === 'offplan') {
    html += '<tr class="row-indigo"><td class="summary-label">بنود حساب الضمان<div class="summary-sub">دفعات المقاول + إشراف + مبيعات + ريرا + حكومية</div></td><td class="amount-col">' + fmt(escrowTotal) + '</td></tr>';
    html += '<tr><td colspan="2" style="border-top:2px dashed #e2e8f0;padding:4px;"></td></tr>';
    html += '<tr class="capital-row"><td>رأس المال المطلوب من المستثمر</td><td class="amount-col">' + fmt(investorTotal) + '</td></tr>';
    html += '<tr class="return-row"><td>نسبة العائد على رأس المال</td><td class="amount-col">' + roiPct + '</td></tr>';
  } else {
    html += '<tr class="capital-row"><td>رأس المال المطلوب من المستثمر<div class="summary-sub">لا يوجد حساب ضمان — المستثمر يتحمل كامل التكلفة</div></td><td class="amount-col">' + fmt(grandTotal) + '</td></tr>';
    html += '<tr class="return-row"><td>نسبة العائد على رأس المال</td><td class="amount-col">' + roiPct + '</td></tr>';
  }

  html += '</tbody></table>';
  html += '</div>';

  html += '</div>'; // end two-col

  // Note
  if (currentView === 'offplan') {
    html += '<p class="note">* سيناريو O1 و O2 لهما نفس التكلفة الإجمالية — الفرق فقط في آلية دفع 20% للمقاول (إيداع ضمان أو دفعة إنجاز)</p>';
  } else {
    html += '<p class="note">* بدون البيع على الخارطة — المستثمر يتحمل كامل تكاليف المشروع ولا يوجد حساب ضمان أو وكيل مبيعات أو تسويق</p>';
  }

  document.getElementById('content').innerHTML = html;
}

loadData();
</script>
</body>
</html>
